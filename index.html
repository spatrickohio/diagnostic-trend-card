<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tug's Garage Diagnostic Trend Card</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="trend-card">
    <h1>Tug's Garage Diagnostic Trend</h1>
    <p class="subtitle">Sump Pump Power History</p>

    <div class="chart-wrap">
      <svg id="chart" viewBox="0 0 800 320" preserveAspectRatio="none"></svg>
    </div>

    <div id="readout" class="readout">
      Touch or drag across the chart to inspect history.
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
