<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Tug's Garage Diagnostic Trend Card</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="trend-card">
    <header class="card-header">
      <h1>Tug's Garage Diagnostic Trend</h1>
      <p>Sump Pump Electrical History</p>
    </header>

    <section class="legend">
      <span><b class="power"></b> Power</span>
      <span><b class="current"></b> Current</span>
      <span><b class="voltage"></b> Voltage</span>
      <span><b class="pf"></b> Power Factor</span>
    </section>

    <section class="chart-wrap">
      <svg id="chart" viewBox="0 0 800 320" preserveAspectRatio="none"></svg>
    </section>

    <section class="time-controls">
      <button data-hours="1">1H</button>
      <button data-hours="3">3H</button>
      <button data-hours="6">6H</button>
      <button data-hours="12">12H</button>
      <button data-hours="24" class="active">24H</button>
    </section>

    <section id="readout" class="readout">
      Touch or drag across the chart to inspect history.
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
